# fly-gog-runner — Fly.io app config.
#
# RUNNER_KEY is NOT set here. It is a secret, injected at runtime via:
#   fly secrets set RUNNER_KEY=<random-key>
# (see README.md). Never commit the key to this file.

app = "gogcli-gog-runner"          # placeholder — rename to your Fly app
primary_region = "ewr"             # US-East (Secaucus NJ); set to your closest region

# How long Fly waits after SIGINT before SIGKILL. MUST exceed the server's
# SHUTDOWN_TIMEOUT_MS (35 s), which in turn covers gog's 30 s exec timeout.
# The default is 5 s — far too short for an in-flight Gmail attachment download,
# and the reason autostop used to sever requests into a gateway HTTP 502.
kill_timeout = "40s"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle; the connector's first request wakes the Machine.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

# Persistent volume holding gog's auth/config, mounted at GOG_HOME.
[[mounts]]
  source = "gogdata"
  destination = "/data"

[env]
  GOG_HOME = "/data"
  # Force a file-based (encrypted) keyring: the container is headless Linux with
  # no OS keychain, and the token must persist on the volume. Pair with the
  # GOG_KEYRING_PASSWORD secret (`fly secrets set`), which gog uses to
  # encrypt/decrypt the stored refresh token under GOG_HOME.
  GOG_KEYRING_BACKEND = "file"

[[vm]]
  size = "shared-cpu-1x"
  # Sized against server.mjs's MAX_BODY_BYTES (32 MB). A single max-size request
  # holds roughly four live copies of the body — the buffered chunks,
  # Buffer.concat, .toString(), then the JSON.parse'd strings — so ~128 MB, plus
  # EXEC_MAX_BUFFER (32 MB) for gog's stdout, so ~160 MB; and requests overlap.
  # Two concurrent max-size requests are therefore ~320 MB plus Node's baseline,
  # which OOM-kills the old 256 MB Machine — and a Fly OOM severs the socket into
  # the opaque gateway 502 the graceful-shutdown work removed. 512 MB clears two
  # concurrent worst-case requests with headroom without over-provisioning for a
  # single-user backend whose real drafts are ~1-2 MB. Raise this in lockstep if
  # MAX_BODY_BYTES ever grows again.
  memory = "512mb"
