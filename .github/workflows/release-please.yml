name: release-please

# Single-workflow monorepo release pipeline (canonical release-please
# shape, matching ofw-mcp).
#
# Job 1 (release-please): runs googleapis/release-please-action with
# linked-versions across all 9 sub-packages. Opens ONE combined release
# PR (separate-pull-requests: false). When that PR merges, the action
# creates a single `v<NEXT>` tag (include-component-in-tag: false).
#
# Job 2 (publish): gates on `tag_name` being set. Checks out the tag,
# builds + packages each sub-package's .skill and .mcpb, publishes
# every sub-package to npm (Trusted Publisher OIDC) and to the MCP
# Registry, publishes each sub-package's SKILL.md to ClawHub (if the
# secret is set), and attaches all artifacts to the release release-
# please already authored.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.RELEASE_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.tag_name != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 26
          cache: npm
          registry-url: https://registry.npmjs.org

      # Strip always-auth and the placeholder _authToken — Trusted
      # Publisher OIDC is the only auth path.
      - run: |
          sed -i '/always-auth/d' "$NPM_CONFIG_USERCONFIG"
          sed -i '/\/\/registry.npmjs.org\/:_authToken/d' "$NPM_CONFIG_USERCONFIG"

      - run: npm ci
      - run: npm run build

      - name: Set VERSION env
        run: |
          VERSION=$(node -p "require('./packages/gogcli-mcp/package.json').version")
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      # Package .skill files for each sub-package that has a SKILL.md
      - name: Package skills
        run: |
          python3 - <<'EOF'
          import zipfile, pathlib, os

          version = os.environ["VERSION"]
          for pkg_dir in pathlib.Path("packages").iterdir():
              skill_file = pkg_dir / "SKILL.md"
              if not skill_file.exists():
                  continue
              pkg = pkg_dir.name
              out = pathlib.Path(f"{pkg}-{version}.skill")
              with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
                  zf.write(skill_file, f"{pkg}/SKILL.md")
              print(f"Packaged {out} ({out.stat().st_size} bytes)")
          EOF

      # Build .mcpb bundles for each sub-package that has a manifest
      - name: Build .mcpb bundles
        run: |
          for PKG_DIR in packages/*/; do
            PKG_DIR="${PKG_DIR%/}"
            PKG=$(basename "$PKG_DIR")
            MANIFEST="${PKG_DIR}/manifest.json"
            if [ -f "${MANIFEST}" ]; then
              cd "${PKG_DIR}"
              npx @anthropic-ai/mcpb pack
              mv "${PKG}.mcpb" "../../${PKG}-${VERSION}.mcpb"
              cd - > /dev/null
            fi
          done

      # Publish each sub-package to npm via Trusted Publisher OIDC.
      # No per-package idempotence check here (npm publish itself errors
      # on duplicate version with code 409 — release re-runs would need
      # to be done with a deleted release first to avoid the error).
      - name: Publish all packages to npm
        run: |
          for PKG_DIR in packages/*/; do
            PKG_DIR="${PKG_DIR%/}"
            PKG_NAME=$(node -p "require('./${PKG_DIR}/package.json').name")
            PUBLISHED=$(npm view "${PKG_NAME}@${VERSION}" version 2>/dev/null || true)
            if [ "$PUBLISHED" = "$VERSION" ]; then
              echo "npm already has ${PKG_NAME}@${VERSION} — skipping."
              continue
            fi
            echo "Publishing ${PKG_NAME}@${VERSION}..."
            cd "${PKG_DIR}"
            npm publish --access public --provenance
            cd - > /dev/null
          done

      # ─── modelcontextprotocol/registry — one publish per sub-package ───
      # PulseMCP auto-ingests from here weekly.
      - name: Install mcp-publisher
        uses: chrischall/mcp-utils/.github/actions/install-mcp-publisher@v0.2.1

      - name: Authenticate to MCP Registry (OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish each sub-package to MCP Registry
        run: |
          for PKG_DIR in packages/*/; do
            PKG_DIR="${PKG_DIR%/}"
            if [ -f "${PKG_DIR}/server.json" ]; then
              echo "Publishing $(basename "$PKG_DIR") to MCP Registry..."
              (cd "${PKG_DIR}" && mcp-publisher publish)
            fi
          done

      # ─── ClawHub — one publish per sub-package's SKILL.md ───
      - name: Publish skills to ClawHub
        continue-on-error: true
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "CLAWHUB_TOKEN not set — skipping ClawHub publish."
            exit 0
          fi
          npx --yes clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          for PKG_DIR in packages/*/; do
            PKG_DIR="${PKG_DIR%/}"
            if [ -f "${PKG_DIR}/SKILL.md" ]; then
              echo "Publishing $(basename "$PKG_DIR") to ClawHub..."
              # ClawHub's `publish` rejects folders containing
              # .claude-plugin/plugin.json; copy SKILL.md to a clean
              # temp dir to sidestep that.
              SKILL_DIR=$(mktemp -d)
              cp "${PKG_DIR}/SKILL.md" "$SKILL_DIR/"
              npx --yes clawhub publish "$SKILL_DIR" --version "${VERSION}" --slug "$(basename "${PKG_DIR}")"
            fi
          done

      # release-please-action already created the GitHub Release with
      # the combined CHANGELOG body. Attach all .skill + .mcpb artifacts
      # via gh release upload --clobber so re-runs overwrite.
      - name: Attach artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          shopt -s nullglob
          ARTIFACTS=( ./*.skill ./*.mcpb )
          if [ ${#ARTIFACTS[@]} -gt 0 ]; then
            echo "Uploading: ${ARTIFACTS[*]}"
            gh release upload "$TAG" "${ARTIFACTS[@]}" --clobber
          else
            echo "No .skill or .mcpb artifacts to upload."
          fi
