name: release-please

# Monorepo mode: linked-versions plugin keeps all 9 gogcli-mcp packages
# on the same shared version. release-please opens ONE combined release
# PR (separate-pull-requests: false) and creates ONE tag (no component
# prefix — include-component-in-tag: false) covering all sub-packages.
#
# When the release PR merges, release-please-action creates a `v<NEXT>`
# tag using RELEASE_PAT. Tag push fires the existing release.yml which
# publishes each sub-package to npm and syncs the manifest version
# files across all packages.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
