name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      # Strip always-auth and default token from .npmrc — trusted publishing uses OIDC
      - run: |
          sed -i '/always-auth/d' "$NPM_CONFIG_USERCONFIG"
          sed -i '/\/\/registry.npmjs.org\/:_authToken/d' "$NPM_CONFIG_USERCONFIG"

      - run: npm ci
      - run: npm run build

      - name: Extract version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      # Sync version across all JSON files in each package directory.
      - name: Sync version files to $VERSION
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            for (const pkgDir of fs.readdirSync('packages').map(d => path.join('packages', d))) {
              for (const f of ['manifest.json', 'server.json', '.claude-plugin/plugin.json', '.claude-plugin/marketplace.json']) {
                const full = path.join(pkgDir, f);
                if (!fs.existsSync(full)) continue;
                const o = JSON.parse(fs.readFileSync(full, 'utf8'));
                if (o.version !== undefined) o.version = '$VERSION';
                if (o.metadata?.version !== undefined) o.metadata.version = '$VERSION';
                if (Array.isArray(o.packages)) o.packages.forEach(p => { if (p.version !== undefined) p.version = '$VERSION'; });
                if (Array.isArray(o.plugins)) o.plugins.forEach(p => { if (p.version !== undefined) p.version = '$VERSION'; });
                fs.writeFileSync(full, JSON.stringify(o, null, 2) + '\n');
              }
            }
          "

      # Package .skill files for each package that has a SKILL.md
      - name: Package skills
        run: |
          python3 - <<'EOF'
          import zipfile, pathlib, os

          version = os.environ["VERSION"]
          for pkg_dir in pathlib.Path("packages").iterdir():
              skill_file = pkg_dir / "SKILL.md"
              if not skill_file.exists():
                  continue
              pkg = pkg_dir.name
              out = pathlib.Path(f"{pkg}-{version}.skill")
              with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
                  zf.write(skill_file, f"{pkg}/SKILL.md")
              print(f"Packaged {out} ({out.stat().st_size} bytes)")
          EOF

      # Build .mcpb bundles for each package that has a manifest
      - name: Build .mcpb bundles
        run: |
          for PKG_DIR in packages/*/; do
            PKG_DIR="${PKG_DIR%/}"
            PKG=$(basename "$PKG_DIR")
            MANIFEST="${PKG_DIR}/manifest.json"
            if [ -f "${MANIFEST}" ]; then
              node -e "
                const fs = require('fs');
                const m = JSON.parse(fs.readFileSync('${MANIFEST}', 'utf8'));
                m.version = '${VERSION}';
                fs.writeFileSync('${MANIFEST}', JSON.stringify(m, null, 2) + '\n');
              "
              cd "${PKG_DIR}"
              npx @anthropic-ai/mcpb pack
              mv "${PKG}.mcpb" "../../${PKG}-${VERSION}.mcpb"
              cd - > /dev/null
            fi
          done

      # Publish all packages to npm via trusted publishing (OIDC)
      - name: Publish to npm
        run: |
          for PKG_DIR in packages/*/; do
            PKG_DIR="${PKG_DIR%/}"
            echo "Publishing $(basename $PKG_DIR)..."
            cd "${PKG_DIR}"
            npm publish --access public --provenance
            cd - > /dev/null
          done

      # ─── modelcontextprotocol/registry — one publish per sub-package ───
      # PulseMCP auto-ingests from here weekly.
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish each sub-package to MCP Registry
        run: |
          for PKG_DIR in packages/*/; do
            PKG_DIR="${PKG_DIR%/}"
            if [ -f "${PKG_DIR}/server.json" ]; then
              echo "Publishing $(basename $PKG_DIR) to MCP Registry..."
              (cd "${PKG_DIR}" && ../../mcp-publisher publish)
            fi
          done

      # ─── ClawHub — one publish per sub-package (each has a SKILL.md) ───
      - name: Publish skills to ClawHub
        continue-on-error: true
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "CLAWHUB_TOKEN not set — skipping ClawHub publish."
            exit 0
          fi
          npx --yes clawhub login --token "$CLAWHUB_TOKEN" --no-browser
          for PKG_DIR in packages/*/; do
            PKG_DIR="${PKG_DIR%/}"
            if [ -f "${PKG_DIR}/SKILL.md" ]; then
              echo "Publishing $(basename $PKG_DIR) to ClawHub..."
              # ClawHub's `publish` rejects folders with .claude-plugin/plugin.json,
              # and `package publish` requires an openclaw.plugin.json we don't ship.
              # Workaround: copy the package's SKILL.md to a clean temp dir.
              SKILL_DIR=$(mktemp -d)
              cp "${PKG_DIR}/SKILL.md" "$SKILL_DIR/"
              npx --yes clawhub publish "$SKILL_DIR" --version "${VERSION}" --slug "$(basename ${PKG_DIR})"
            fi
          done

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          node scripts/changelog.js "$PREV_TAG" > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          body_path: RELEASE_NOTES.md
          files: |
            *.skill
            *.mcpb
