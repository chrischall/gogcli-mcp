name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      # Strip always-auth and default token from .npmrc — trusted publishing uses OIDC
      - run: |
          sed -i '/always-auth/d' "$NPM_CONFIG_USERCONFIG"
          sed -i '/\/\/registry.npmjs.org\/:_authToken/d' "$NPM_CONFIG_USERCONFIG"

      - run: npm ci
      - run: npm run build

      - name: Extract version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      # Package the .skill file (base package only)
      - name: Package skill
        run: |
          python3 - <<'EOF'
          import zipfile, pathlib, os

          version = os.environ["VERSION"]
          pkg_dir = pathlib.Path("packages/gogcli-mcp")
          out = pathlib.Path(f"gogcli-mcp-{version}.skill")

          skill_file = pkg_dir / "SKILL.md"
          if skill_file.exists():
              with zipfile.ZipFile(out, "w", zipfile.ZIP_DEFLATED) as zf:
                  zf.write(skill_file, "gogcli-mcp/SKILL.md")
              print(f"Packaged {out} ({out.stat().st_size} bytes)")
          EOF

      # Build .mcpb bundles for each package that has a manifest
      - name: Build .mcpb bundles
        run: |
          for PKG_DIR in packages/gogcli-mcp packages/gogcli-mcp-sheets packages/gogcli-mcp-docs; do
            PKG=$(basename "$PKG_DIR")
            MANIFEST="${PKG_DIR}/manifest.json"
            if [ -f "${MANIFEST}" ]; then
              node -e "
                const fs = require('fs');
                const m = JSON.parse(fs.readFileSync('${MANIFEST}', 'utf8'));
                m.version = '${VERSION}';
                fs.writeFileSync('${MANIFEST}', JSON.stringify(m, null, 2) + '\n');
              "
              cd "${PKG_DIR}"
              npx @anthropic-ai/mcpb pack
              mv "${PKG}.mcpb" "../../${PKG}-${VERSION}.mcpb"
              cd - > /dev/null
            fi
          done

      # Publish all packages to npm via trusted publishing (OIDC)
      - name: Publish to npm
        run: |
          for PKG_DIR in packages/gogcli-mcp packages/gogcli-mcp-sheets packages/gogcli-mcp-docs; do
            echo "Publishing $(basename $PKG_DIR)..."
            cd "${PKG_DIR}"
            npm publish --access public --provenance
            cd - > /dev/null
          done

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          node scripts/changelog.js "$PREV_TAG" > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          body_path: RELEASE_NOTES.md
          files: |
            gogcli-mcp-${{ env.VERSION }}.skill
            gogcli-mcp-${{ env.VERSION }}.mcpb
            gogcli-mcp-sheets-${{ env.VERSION }}.mcpb
            gogcli-mcp-docs-${{ env.VERSION }}.mcpb
