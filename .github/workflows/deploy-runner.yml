# On-demand redeploy of the Fly backend (fly-gog-runner). The automatic path is
# the `deploy-runner` job in release-please.yml, which pins the deploy to the
# release tag; this stub exists to ship a backend-only fix without cutting a
# release, or to retry a release deploy that failed.
#
# No template for this in chrischall/workflows: gogcli-mcp is currently the only
# fleet repo with a Fly backend. Add `templates/deploy-runner.yml` there if a
# second one appears, rather than copying this file.
#
# Serialisation is declared by the reusable workflow (one group per repository),
# NOT here — a group in this file would only cover workflow_dispatch runs and
# would still let a manual redeploy race the release-triggered one.
#
# Requires the `FLY_API_TOKEN` repo secret.

name: deploy-runner

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch, tag or SHA).
        type: string
        default: main
        required: true

permissions:
  contents: read

jobs:
  deploy:
    uses: chrischall/workflows/.github/workflows/reusable-fly-deploy.yml@main
    with:
      ref: ${{ inputs.ref }}
      working-directory: fly-gog-runner
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
